<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You Mental?</title>
    <meta name="description" content="A fun interactive website with neon theme">
    <link rel="stylesheet" href="style.css">
    <!-- Using Poppins, an elegant modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="main-container">
        <h1 class="question">Are you mental?</h1>
        <div class="button-container">
            <button id="btn-yes" class="btn btn-yes">Yes</button>
            <button id="btn-no" class="btn btn-no">No</button>
        </div>
        <div class="message-container">
            <div id="message" class="message hidden">Yes, I knew it!</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
